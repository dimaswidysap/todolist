<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo list</title>
    <link rel="stylesheet" href="css/addClass.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsif.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <script type="module" src="javascript/main.js"></script>
    <script type="module" src="javascript/nav.js"></script>
  </head>
  <body>
    <main>
      <nav class="nav">
        <header>
          <h2>Choose Activity</h2>
          <button></button>
        </header>
        <section>
          <ul>
            <li class="list"><button class="btn-list">All</button></li>
            <li class="list"><button class="btn-list">Work</button></li>
            <li class="list"><button class="btn-list">Gaming</button></li>
            <li class="list"><button class="btn-list">Food</button></li>
          </ul>
        </section>
        <section class="list">
          <button>Add more Activity</button>
        </section>
      </nav>
      <section class="container-list">
        <div class="container-lists all-list">
          <header class="header-lists"><h2>All</h2></header>
        </div>
        <div class="container-lists all-list contentNoactive">
          <header class="header-lists"><h2>Work</h2></header>
        </div>
        <div class="container-lists all-list contentNoactive">
          <header class="header-lists"><h2>Gaming</h2></header>
        </div>
        <div class="container-lists all-list contentNoactive">
          <header class="header-lists"><h2>Food</h2></header>
        </div>
      </section>
    </main>
  </body>
</html>
