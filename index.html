<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo list</title>
    <link rel="stylesheet" href="css/addClass.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsif.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/header-content.css" />
    <link rel="stylesheet" href="css/form.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <script type="module" src="javascript/main.js"></script>
    <script type="module" src="javascript/nav.js"></script>
    <script type="module" src="javascript/header-content.js"></script>
    <script type="module" src="javascript/form-input.js"></script>
  </head>
  <body>
    <main>
      <!-- nav -->
      <nav class="nav">
        <header>
          <h2>Choose Activity</h2>
          <button class="close-nav">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
        </header>
        <section>
          <ul>
            <li class="list">
              <button class="btn-list">
                <span class="indikator"></span>All
              </button>
            </li>
            <li class="list">
              <button class="btn-list">
                <span class="indikator contentNoactive"></span>Work
              </button>
            </li>
            <li class="list">
              <button class="btn-list">
                <span class="indikator contentNoactive"></span>Study
              </button>
            </li>
            <li class="list">
              <button class="btn-list">
                <span class="indikator contentNoactive"></span>Gaming
              </button>
            </li>
            <li class="list">
              <button class="btn-list">
                <span class="indikator contentNoactive"></span>Food
              </button>
            </li>
          </ul>
        </section>
        <!-- <section class="list">
          <button>Add more Activity</button>
        </section> -->
      </nav>
      <!-- container-content -->
      <section class="container-list">
        <header class="header-content">
          <button class="open-nav">
            <span class="material-symbols-outlined">menu</span>
          </button>
        </header>
        <!--  -->
        <div class="bhgjik">
          <header>
            <h2>All</h2>
            <i class="material-symbols-outlined">all_inclusive</i>
          </header>
          <section>
            <button class="show-form">
              <span>Create List</span>
              <i class="material-symbols-outlined">add</i>
            </button>
          </section>
          <ul class="container-lists"></ul>
        </div>
        <!--  -->
        <div class="bhgjik contentNoactive">
          <header>
            <h2>Work</h2>
            <i class="material-symbols-outlined">work</i>
          </header>
          <section>
            <button class="show-form">
              <span>Create List</span>
              <i class="material-symbols-outlined">add</i>
            </button>
          </section>
          <ul class="container-lists"></ul>
        </div>
        <!--  -->
        <div class="bhgjik contentNoactive">
          <header>
            <h2>Study</h2>
            <i class="material-symbols-outlined">book_2</i>
          </header>
          <section>
            <button class="show-form">
              <span>Create List</span>
              <i class="material-symbols-outlined">add</i>
            </button>
          </section>
          <ul class="container-lists"></ul>
        </div>
        <!--  -->
        <div class="bhgjik contentNoactive">
          <header>
            <h2>Gaming</h2>
            <i class="material-symbols-outlined">gamepad</i>
          </header>
          <section>
            <button class="show-form">
              <span>Create List</span>
              <i class="material-symbols-outlined">add</i>
            </button>
          </section>
          <ul class="container-lists"></ul>
        </div>
        <!--  -->
        <div class="bhgjik contentNoactive">
          <header>
            <h2>Food</h2>
            <i class="material-symbols-outlined">egg_alt</i>
          </header>
          <section>
            <button class="show-form">
              <span>Create List</span>
              <i class="material-symbols-outlined">add</i>
            </button>
          </section>
          <ul class="container-lists"></ul>
        </div>
        <!--  -->
      </section>
    </main>
    <!-- form -->
    <section class="container-form">
      <button id="form-close">
        <i class="material-symbols-outlined">close</i> <span>Close</span>
      </button>
      <form id="todoForm" action="#" method="GET">
        <div>
          <label for="taskInput">New List<span>.</span></label>
          <input type="text" id="taskInput" />
        </div>
        <div>
          <button type="submit">
            <i class="material-symbols-outlined">add</i><span>Add List</span>
          </button>
        </div>
      </form>
    </section>
  </body>
</html>
